<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedRebel Intelligent Hub, 3D</title>
<style>
  :root{
    --mr-deep:#005FFF; --mr-blue:#008CFF; --mr-cyan:#33CCFF;
    --ops:#10b981; --comms:#3b82f6; --growth:#f59e0b;
    --bg:#070b16; --text:#f1f5f9; --muted:#8fa3bf;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--bg);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overflow:hidden}

  #mr-hub-3d{position:relative;width:100%;height:100vh;min-height:560px;
    background:
      radial-gradient(1200px 700px at 50% 42%, #0d1730 0%, #070b16 62%, #04060d 100%);
    user-select:none;-webkit-user-select:none;touch-action:pan-y}
  #mr-hub-3d canvas{display:block;cursor:grab}
  #mr-hub-3d canvas.dragging{cursor:grabbing}
  #mr-hub-3d canvas.hovering{cursor:pointer}

  .mr-vignette{position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(ellipse at center, transparent 52%, rgba(2,4,10,0.55) 100%)}

  .mr-head{position:absolute;top:38px;left:0;right:0;text-align:center;pointer-events:none;z-index:5}
  .mr-eyebrow{display:inline-block;font-size:12px;font-weight:700;letter-spacing:0.32em;
    color:var(--mr-cyan);text-transform:uppercase}
  .mr-title{margin-top:10px;font-size:clamp(24px,3.4vw,40px);font-weight:800;color:var(--text);
    letter-spacing:-0.01em}
  .mr-title .lite{color:var(--mr-cyan)}
  .mr-chips{margin-top:14px;display:flex;gap:10px;justify-content:center}
  .mr-chip{font-size:11.5px;font-weight:600;letter-spacing:0.06em;color:#bfe9ff;
    border:1px solid rgba(51,204,255,0.35);background:rgba(51,204,255,0.08);
    padding:6px 14px;border-radius:999px}

  .mr-hint{position:absolute;bottom:26px;left:0;right:0;text-align:center;pointer-events:none;z-index:5;
    font-size:12.5px;color:var(--muted);letter-spacing:0.04em;
    animation:mrHint 3.2s ease-in-out infinite}
  @keyframes mrHint{0%,100%{opacity:0.55}50%{opacity:1}}

  .mr-reset{position:absolute;top:30px;right:30px;z-index:6;
    font-size:11.5px;font-weight:600;letter-spacing:0.08em;color:#bfe9ff;cursor:pointer;
    border:1px solid rgba(51,204,255,0.3);background:rgba(10,18,38,0.6);
    padding:8px 16px;border-radius:999px;transition:all .2s}
  .mr-reset:hover{background:rgba(51,204,255,0.15);border-color:rgba(51,204,255,0.6)}

  .mr-loader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    z-index:9;background:var(--bg);transition:opacity .8s;flex-direction:column;gap:18px}
  .mr-loader.done{opacity:0;pointer-events:none}
  .mr-pulse{width:46px;height:46px;border-radius:50%;
    background:radial-gradient(circle, var(--mr-cyan), var(--mr-deep));
    animation:mrBeat 1.05s ease-in-out infinite}
  .mr-loader span{font-size:12px;letter-spacing:0.28em;color:var(--muted);text-transform:uppercase}
  @keyframes mrBeat{0%,100%{transform:scale(1)}12%{transform:scale(1.22)}24%{transform:scale(1.04)}36%{transform:scale(1.14)}50%{transform:scale(1)}}

  @media (max-width:700px){
    .mr-head{top:24px}
    .mr-reset{top:20px;right:16px}
  }
</style>
</head>
<body>

<section id="mr-hub-3d">
  <div class="mr-loader" id="mrLoader"><div class="mr-pulse"></div><span>Systems + Heart</span></div>
  <div class="mr-vignette"></div>
  <div class="mr-head">
    <span class="mr-eyebrow">Build Your Custom Operating System</span>
    <div class="mr-title">MedRebel <span class="lite">Intelligent Hub</span></div>
    <div class="mr-chips">
      <span class="mr-chip">HIPAA SECURE</span>
      <span class="mr-chip">POWERED BY CLAUDE</span>
    </div>
  </div>
  <button class="mr-reset" id="mrReset">RESET VIEW</button>
  <div class="mr-hint">Drag to explore &middot; Hover a module</div>
</section>

}}
</script>

/* ---------- custom orbit (drag, inertia, idle auto-rotate) ---------- */
const orbit = {
  radius: isMobile ? 30 : 24.5,
  theta: 0.0, phi: 1.32,
  vTheta: 0, vPhi: 0,
  dragging: false, lastX:0, lastY:0, lastInput: -10
};
const ORBIT_HOME = {theta:0.0, phi:1.32};

function applyCamera(){
  orbit.phi = Math.max(0.55, Math.min(2.05, orbit.phi));
  const sp = Math.sin(orbit.phi), cp = Math.cos(orbit.phi);
  camera.position.set(
    orbit.radius * sp * Math.sin(orbit.theta),
    orbit.radius * cp,
    orbit.radius * sp * Math.cos(orbit.theta)
  );
  camera.lookAt(0, 0.4, 0);
}

const cv = renderer.domElement;
function pointerDown(x, y){ orbit.dragging = true; orbit.lastX = x; orbit.lastY = y; cv.classList.add('dragging'); }
function pointerMoveDrag(x, y, t){
  if(!orbit.dragging) return;
  const dx = x - orbit.lastX, dy = y - orbit.lastY;
  orbit.vTheta = -dx * 0.0052; orbit.vPhi = -dy * 0.0042;
  orbit.theta += orbit.vTheta; orbit.phi += orbit.vPhi;
  orbit.lastX = x; orbit.lastY = y; orbit.lastInput = t;
}
function pointerUp(t){ orbit.dragging = false; orbit.lastInput = t; cv.classList.remove('dragging'); }

cv.addEventListener('mousedown', e => pointerDown(e.clientX, e.clientY));
window.addEventListener('mousemove', e => pointerMoveDrag(e.clientX, e.clientY, clockNow()));
window.addEventListener('mouseup', () => pointerUp(clockNow()));
cv.addEventListener('touchstart', e => { if(e.touches.length===1) pointerDown(e.touches[0].clientX, e.touches[0].clientY); }, {passive:true});
cv.addEventListener('touchmove', e => { if(e.touches.length===1) pointerMoveDrag(e.touches[0].clientX, e.touches[0].clientY, clockNow()); }, {passive:true});
cv.addEventListener('touchend', () => pointerUp(clockNow()), {passive:true});

document.getElementById('mrReset').addEventListener('click', () => {

});

/* ---------- glow texture helper ---------- */
function glowTexture(inner, outer){
  const c = document.createElement('canvas'); c.width = c.height = 256;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(128,128,0, 128,128,128);
  grad.addColorStop(0, inner); grad.addColorStop(0.35, outer); grad.addColorStop(1, 'rgba(0,0,0,0)');
  g.fillStyle = grad; g.fillRect(0,0,256,256);
  const tx = new THREE.CanvasTexture(c); tx.colorSpace = THREE.SRGBColorSpace;
  return tx;
}
const softGlowTex = glowTexture('rgba(190,235,255,0.9)', 'rgba(51,150,255,0.32)');

function buildProceduralHeart(){
  const s = new THREE.Shape();
  s.moveTo(0, 0.8);
  s.bezierCurveTo(0, 1.4, -1.25, 1.42, -1.25, 0.58);
  s.bezierCurveTo(-1.25, -0.18, -0.45, -0.55, 0, -1.25);
  s.bezierCurveTo(0.45, -0.55, 1.25, -0.18, 1.25, 0.58);
  s.bezierCurveTo(1.25, 1.42, 0, 1.4, 0, 0.8);
  let geo = new THREE.ExtrudeGeometry(s, {
    depth: 0.7, curveSegments: 5, steps: 1,
    bevelEnabled: true, bevelThickness: 0.22, bevelSize: 0.2, bevelSegments: 2
  });
  geo.center();
  geo = geo.toNonIndexed();
  geo.computeVertexNormals();

  const palette = [new THREE.Color(COLORS.deep), new THREE.Color(COLORS.blue), new THREE.Color(COLORS.cyan)];
  const pos = geo.attributes.position;
  const cols = new Float32Array(pos.count * 3);
  for(let f = 0; f < pos.count; f += 3){
    const cxv = (pos.getX(f) + pos.getX(f+1) + pos.getX(f+2)) / 3;
    const cyv = (pos.getY(f) + pos.getY(f+1) + pos.getY(f+2)) / 3;
    let t = (cxv * 0.32 + cyv * 0.5 + 1.2) / 2.4 + (Math.random() - 0.5) * 0.22;
    t = Math.max(0, Math.min(1, t));
    const col = t < 0.5 ? palette[0].clone().lerp(palette[1], t*2) : palette[1].clone().lerp(palette[2], (t-0.5)*2);
    for(let v = 0; v < 3; v++){ cols[(f+v)*3] = col.r; cols[(f+v)*3+1] = col.g; cols[(f+v)*3+2] = col.b; }
  }
  geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));

  const mat = new THREE.MeshPhysicalMaterial({
    vertexColors: true, flatShading: true,
    metalness: 0.25, roughness: 0.18, clearcoat: 0.8, clearcoatRoughness: 0.25,
    emissive: new THREE.Color(0x0a2fb0), emissiveIntensity: 0.12,
    envMapIntensity: 1.25
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.scale.setScalar(1.75);
  return mesh;
}

let heartMaterials = [];
function adoptHeart(object){
  heartGroup.add(object);
  const box = new THREE.Box3().setFromObject(heartGroup);
  const size = box.getSize(new THREE.Vector3());
  const scale = 4.6 / Math.max(size.x, size.y, size.z);
  heartGroup.scale.setScalar(scale);
  box.setFromObject(heartGroup);
  const center = box.getCenter(new THREE.Vector3());
  heartGroup.position.sub(center);
  heartGroup.position.y += 0.2;
  heartGroup.userData.baseScale = heartGroup.scale.x;
  heartGroup.userData.baseY = heartGroup.position.y;
  heartGroup.traverse(o => {
    if(o.isMesh && o.material){
      o.material.envMapIntensity = 1.25;
      if(o.material.emissive) o.material.emissive.set(0x0a2fb0);
      heartMaterials.push(o.material);
    }
  });
}

new GLTFLoader().load('medrebel-heart.glb',
  g => adoptHeart(g.scene),
  undefined,
  () => adoptHeart(buildProceduralHeart())
);

/* ---------- heartbeat (lub-dub) ---------- */
const BPM = 58;
const PERIOD = 60 / BPM;
const beatAmp = reducedMotion ? 0.04 : 0.085;
function gauss(x, c, w){ const d = x - c; return Math.exp(-(d*d)/(2*w*w)); }
function beatValue(phase){ return gauss(phase, 0.03, 0.045) + 0.55 * gauss(phase, 0.19, 0.055); }

/* shockwave rings spawned each beat */
const ringGeo = new THREE.RingGeometry(0.96, 1.0, 64);
const rings = [];
function spawnRing(strength){
  const m = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({
    color: COLORS.cyan, transparent: true, opacity: 0.45 * strength,
    side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false
  }));
  m.rotation.x = -Math.PI / 2;
  m.position.y = -0.2;
  m.userData = {age: 0, strength};
  scene.add(m); rings.push(m);
}

/* ---------- module cards ---------- */
function roundRect(g, x, y, w, h, r){
  g.beginPath();
  g.moveTo(x+r, y);
  g.arcTo(x+w, y, x+w, y+h, r);
  g.arcTo(x+w, y+h, x, y+h, r);
  g.arcTo(x, y+h, x, y, r);
  g.arcTo(x, y, x+w, y, r);
  g.closePath();
}

function cardTexture(title, desc, accent){
  const W = 768, H = 312;
  const c = document.createElement('canvas'); c.width = W; c.height = H;
  const g = c.getContext('2d');
  roundRect(g, 6, 6, W-12, H-12, 40);
  g.fillStyle = 'rgba(11,18,36,0.93)'; g.fill();
  g.lineWidth = 3; g.strokeStyle = accent + '55'; g.stroke();
  const topGrad = g.createLinearGradient(0, 6, 0, 120);
  topGrad.addColorStop(0, 'rgba(255,255,255,0.07)'); topGrad.addColorStop(1, 'rgba(255,255,255,0)');
  roundRect(g, 6, 6, W-12, 114, 40); g.fillStyle = topGrad; g.fill();
  g.beginPath(); g.arc(74, 86, 17, 0, Math.PI*2);
  g.fillStyle = accent; g.fill();
  g.beginPath(); g.arc(74, 86, 28, 0, Math.PI*2);
  g.strokeStyle = accent + '66'; g.lineWidth = 3; g.stroke();
  g.fillStyle = '#f1f5f9'; g.font = '600 40px Inter, -apple-system, sans-serif';
  g.fillText(title, 124, 100);
  g.fillStyle = '#94a3b8'; g.font = '400 30px Inter, -apple-system, sans-serif';
  g.fillText(desc, 60, 186);
  g.fillStyle = accent; g.font = '600 28px Inter, -apple-system, sans-serif';
  g.fillText('Learn more →', 60, 254);
  const tx = new THREE.CanvasTexture(c);
  tx.colorSpace = THREE.SRGBColorSpace;
  tx.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return tx;
}

function labelTexture(text, accent){
  const W = 1024, H = 96;
  const c = document.createElement('canvas'); c.width = W; c.height = H;
  const g = c.getContext('2d');
  g.fillStyle = accent; g.font = '700 44px Inter, -apple-system, sans-serif';
  g.textAlign = 'center';
  const spaced = text.split('').join('  ');
  g.fillText(spaced, W/2, 62);
  const tx = new THREE.CanvasTexture(c);
  tx.colorSpace = THREE.SRGBColorSpace;
  return tx;
}

function pmsCardTexture(logoImg){
  const W = 768, H = 432;
  const c = document.createElement('canvas'); c.width = W; c.height = H;
  const g = c.getContext('2d');
  roundRect(g, 6, 6, W-12, H-12, 40);
  g.fillStyle = 'rgba(11,18,36,0.93)'; g.fill();
  g.lineWidth = 3; g.strokeStyle = 'rgba(51,204,255,0.4)'; g.stroke();
  g.fillStyle = '#33CCFF'; g.font = '700 30px Inter, -apple-system, sans-serif';
  g.textAlign = 'center';
  g.fillText('Y O U R   P M S / E H R', W/2, 70);
  roundRect(g, 134, 100, 500, 180, 26);
  g.fillStyle = '#ffffff'; g.fill();
  if(logoImg){
    const lw = 380, lh = lw * (logoImg.height / logoImg.width);
    g.drawImage(logoImg, (W-lw)/2, 100 + (180-lh)/2, lw, lh);
  } else {
    g.fillStyle = '#94a3b8'; g.font = '500 26px Inter, sans-serif';
    g.fillText('[LOGO MISSING]', W/2, 200);
  }
  const badges = ['HIPAA SECURE', 'REAL-TIME SYNC', 'READ & WRITE'];
  const bw = 212, gap = 14, total = badges.length*bw + (badges.length-1)*gap;
  let bx = (W-total)/2;
  badges.forEach(b => {
    roundRect(g, bx, 318, bw, 58, 29);
    g.fillStyle = 'rgba(16,185,129,0.12)'; g.fill();
    g.strokeStyle = 'rgba(16,185,129,0.5)'; g.lineWidth = 2; g.stroke();
    g.fillStyle = '#34d399'; g.font = '600 22px Inter, sans-serif';
    g.fillText(b, bx + bw/2, 354);
    bx += bw + gap;
  });
  const tx = new THREE.CanvasTexture(c);
  tx.colorSpace = THREE.SRGBColorSpace;
  tx.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return tx;
}

/* ---------- layout: clusters + connections ---------- */
const cards = [];
const connections = [];
const RADIUS = 11.5;
const CARD_W = 4.7, CARD_H = CARD_W * (312/768);

function curveTo(target){
  const dir = target.clone().setY(0).normalize();
  const mid = dir.multiplyScalar(target.length() * 0.45);
  mid.y = target.y * 0.2 + 1.6;
  return new THREE.CubicBezierCurve3(
    new THREE.Vector3(0, 0.3, 0),
    new THREE.Vector3(mid.x * 0.35, 1.2, mid.z * 0.35),
    mid,
    target
  );
}

function addConnection(target, colorHex){
  const curve = curveTo(target);
  const tube = new THREE.Mesh(
    new THREE.TubeGeometry(curve, 48, 0.028, 6, false),
    new THREE.MeshBasicMaterial({color: colorHex, transparent: true, opacity: 0.16,
      blending: THREE.AdditiveBlending, depthWrite: false})
  );
  scene.add(tube);
  const pulse = new THREE.Sprite(new THREE.SpriteMaterial({
    map: softGlowTex, color: colorHex, transparent: true, opacity: 0,
    blending: THREE.AdditiveBlending, depthWrite: false
  }));
  pulse.scale.setScalar(0.9);
  scene.add(pulse);
  const conn = {curve, tube, pulse, t: 2, delay: Math.random() * 0.22, baseOpacity: 0.16};
  connections.push(conn);
  return conn;
}

function addCard(pos, texture, w, h, conn){
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map: texture, transparent: true}));
  sprite.scale.set(w, h, 1);
  sprite.position.copy(pos);
  sprite.userData = {baseScale: new THREE.Vector2(w, h), hover: 0, conn};
  scene.add(sprite);
  cards.push(sprite);
  if(conn) conn.card = sprite;
  return sprite;
}

GROUPS.forEach(group => {
  const az = group.azimuth * Math.PI / 180;
  const heights = [2.9, 0.0, -2.9];
  group.items.forEach((item, i) => {
    const jitter = (i - 1) * 0.16;
    const pos = new THREE.Vector3(
      (RADIUS + Math.abs(i-1) * 0.4) * Math.sin(az + jitter),
      heights[i],
      (RADIUS + Math.abs(i-1) * 0.4) * Math.cos(az + jitter)
    );
    const conn = addConnection(pos, group.color);
    addCard(pos, cardTexture(item.title, item.desc, group.color), CARD_W, CARD_H, conn);
  });
  const labelPos = new THREE.Vector3(RADIUS * Math.sin(az), 5.4, RADIUS * Math.cos(az));
  const label = new THREE.Sprite(new THREE.SpriteMaterial({
    map: labelTexture(group.label, group.color), transparent: true, opacity: 0.95, depthWrite: false
  }));
  label.scale.set(7.2, 0.675, 1);
  label.position.copy(labelPos);
  scene.add(label);
});

/* PMS / EHR node, real Open Dental logo embedded */
(function(){
  const az = -150 * Math.PI / 180;
  const pos = new THREE.Vector3(10.2 * Math.sin(az), 1.4, 10.2 * Math.cos(az));
  const conn = addConnection(pos, COLORS.pms);
  const img = new Image();
  img.onload = () => addCard(pos, pmsCardTexture(img), 4.9, 4.9 * (432/768), conn);
  img.onerror = () => addCard(pos, pmsCardTexture(null), 4.9, 4.9 * (432/768), conn);
  img.src = 'data:image/png;base64,' + OD_LOGO_B64;
})();

/* ---------- ambient particles ---------- */
const starCount = isMobile ? 140 : 260;
const starPos = new Float32Array(starCount * 3);
for(let i = 0; i < starCount; i++){
  const r = 16 + Math.random() * 26;
  const a = Math.random() * Math.PI * 2;
  const y = (Math.random() - 0.5) * 26;
  starPos[i*3] = r * Math.sin(a); starPos[i*3+1] = y; starPos[i*3+2] = r * Math.cos(a);
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({
  color: 0x5d8fdd, size: 0.07, transparent: true, opacity: 0.55,
  blending: THREE.AdditiveBlending, depthWrite: false
}));
scene.add(stars);

/* ---------- hover raycast ---------- */
const raycaster = new THREE.Raycaster();
const mouseNDC = new THREE.Vector2(-10, -10);
let hovered = null;
cv.addEventListener('mousemove', e => {
  const r = cv.getBoundingClientRect();
  mouseNDC.set(((e.clientX - r.left) / r.width) * 2 - 1, -((e.clientY - r.top) / r.height) * 2 + 1);
});
cv.addEventListener('mouseleave', () => mouseNDC.set(-10, -10));

/* ---------- animation loop ---------- */
const clock = new THREE.Clock();
function clockNow(){ return clock.elapsedTime; }
let lastBeatIndex = -1;
let visible = true;
new IntersectionObserver(en => { visible = en[0].isIntersecting; }, {threshold: 0.05}).observe(section);

function animate(){
  requestAnimationFrame(animate);
  if(!visible) return;
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  /* orbit inertia + idle rotation + reset easing */
  if(!orbit.dragging){
    orbit.theta += orbit.vTheta; orbit.phi += orbit.vPhi;
    orbit.vTheta *= 0.92; orbit.vPhi *= 0.92;
    if(resetTarget){
      orbit.theta += (resetTarget.theta - orbit.theta) * 0.07;
      orbit.phi += (resetTarget.phi - orbit.phi) * 0.07;
      if(Math.abs(resetTarget.theta - orbit.theta) < 0.002 && Math.abs(resetTarget.phi - orbit.phi) < 0.002) resetTarget = null;
    } else if(!reducedMotion && t - orbit.lastInput > 3.5){
      orbit.theta += 0.0016;
    }
  } else {
    resetTarget = null;
  }
  applyCamera();

  /* heartbeat */
  const phase = (t % PERIOD) / PERIOD;
  const beat = beatValue(phase);
  const s = 1 + beatAmp * beat;
  if(heartGroup.userData.baseScale !== undefined){
    heartGroup.scale.setScalar(heartGroup.userData.baseScale * s);
    heartGroup.position.y = heartGroup.userData.baseY + Math.sin(t * 0.8) * 0.12;
  }
  heartGroup.rotation.y = Math.sin(t * 0.4) * 0.08;

  heartGlow.material.opacity = 0.34 + 0.4 * beat;
  heartGlow.scale.setScalar(10.5 + 2.6 * beat);
  heartLight.intensity = 1.6 + 5.0 * beat;
  heartMaterials.forEach(m => { m.emissiveIntensity = 0.1 + 0.55 * beat; });

  /* beat triggers: rings + connection pulses */
  const beatIndex = Math.floor(t / PERIOD);
  if(beatIndex !== lastBeatIndex){
    lastBeatIndex = beatIndex;
    if(!reducedMotion) spawnRing(1);
    connections.forEach(cn => { cn.t = -cn.delay; });
  }
  for(let i = rings.length - 1; i >= 0; i--){
    const m = rings[i];
    m.userData.age += dt;
    const a = m.userData.age / 1.25;
    if(a >= 1){ scene.remove(m); m.material.dispose(); rings.splice(i, 1); continue; }
    const sc = 1.5 + a * 11;
    m.scale.setScalar(sc);
    m.material.opacity = 0.4 * (1 - a) * (1 - a);
  }
  connections.forEach(cn => {
    cn.t += dt / 0.95;
    if(cn.t >= 0 && cn.t <= 1){
      const p = cn.curve.getPoint(cn.t);
      cn.pulse.position.copy(p);
      cn.pulse.material.opacity = Math.sin(cn.t * Math.PI) * 0.95;
    } else {
      cn.pulse.material.opacity = 0;
    }
  });

  /* hover */
  raycaster.setFromCamera(mouseNDC, camera);
  const hits = raycaster.intersectObjects(cards, false);
  const hit = hits.length ? hits[0].object : null;
  if(hit !== hovered){ hovered = hit; cv.classList.toggle('hovering', !!hovered); }
  cards.forEach(cd => {
    const target = cd === hovered ? 1 : 0;
    cd.userData.hover += (target - cd.userData.hover) * 0.14;
    const k = 1 + cd.userData.hover * 0.09;
    cd.scale.set(cd.userData.baseScale.x * k, cd.userData.baseScale.y * k, 1);
    if(cd.userData.conn){
      cd.userData.conn.tube.material.opacity = cd.userData.conn.baseOpacity + cd.userData.hover * 0.4;
    }
  });

  stars.rotation.y = t * 0.008;

  renderer.render(scene, camera);
}

applyCamera();
animate();
setTimeout(() => loaderEl.classList.add('done'), 900);

window.addEventListener('resize', () => {
  camera.aspect = section.clientWidth / section.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(section.clientWidth, section.clientHeight);
});
</script>
