<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedRebel Intelligent Hub, 3D</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overflow:hidden}

  #mr-hub-3d{position:relative;width:100%;height:100vh;min-height:560px;
    user-select:none;-webkit-user-select:none;touch-action:pan-y}
  #mr-hub-3d[data-theme="dark"]{
    background:radial-gradient(1200px 760px at 50% 42%, #182646 0%, #0d1730 58%, #0a1126 100%)}
  #mr-hub-3d[data-theme="light"]{
    background:radial-gradient(1200px 760px at 50% 42%, #ffffff 0%, #f2f7fd 58%, #e7eff9 100%)}
  #mr-hub-3d canvas{display:block;cursor:grab}
  #mr-hub-3d canvas.dragging{cursor:grabbing}
  #mr-hub-3d canvas.hovering{cursor:pointer}

  .mr-vignette{position:absolute;inset:0;pointer-events:none}
  [data-theme="dark"] .mr-vignette{background:radial-gradient(ellipse at center, transparent 55%, rgba(5,9,20,0.45) 100%)}
  [data-theme="light"] .mr-vignette{background:radial-gradient(ellipse at center, transparent 60%, rgba(176,196,224,0.28) 100%)}

  .mr-head{position:absolute;top:36px;left:0;right:0;text-align:center;pointer-events:none;z-index:5}
  .mr-eyebrow{display:inline-block;font-size:12px;font-weight:700;letter-spacing:0.32em;text-transform:uppercase}
  [data-theme="dark"] .mr-eyebrow{color:#33CCFF}
  [data-theme="light"] .mr-eyebrow{color:#0066dd}
  .mr-title{margin-top:10px;font-size:clamp(24px,3.4vw,40px);font-weight:800;letter-spacing:-0.01em}
  [data-theme="dark"] .mr-title{color:#f1f5f9}
  [data-theme="light"] .mr-title{color:#0b1a33}
  [data-theme="dark"] .mr-title .lite{color:#33CCFF}
  [data-theme="light"] .mr-title .lite{color:#008CFF}
  .mr-chips{margin-top:14px;display:flex;gap:10px;justify-content:center}
  .mr-chip{font-size:11.5px;font-weight:600;letter-spacing:0.06em;padding:6px 14px;border-radius:999px}
  [data-theme="dark"] .mr-chip{color:#bfe9ff;border:1px solid rgba(51,204,255,0.35);background:rgba(51,204,255,0.08)}
  [data-theme="light"] .mr-chip{color:#0a5bd0;border:1px solid rgba(0,95,255,0.3);background:rgba(0,140,255,0.06)}

  .mr-hint{position:absolute;bottom:24px;left:0;right:0;text-align:center;pointer-events:none;z-index:5;
    font-size:12.5px;letter-spacing:0.04em;animation:mrHint 3.2s ease-in-out infinite}
  [data-theme="dark"] .mr-hint{color:#8fa3bf}
  [data-theme="light"] .mr-hint{color:#6b7c95}
  @keyframes mrHint{0%,100%{opacity:0.55}50%{opacity:1}}

  .mr-btns{position:absolute;top:30px;right:30px;z-index:6;display:flex;gap:10px}
  .mr-btn{font-size:11.5px;font-weight:600;letter-spacing:0.08em;cursor:pointer;
    padding:8px 16px;border-radius:999px;transition:all .2s}
  [data-theme="dark"] .mr-btn{color:#bfe9ff;border:1px solid rgba(51,204,255,0.3);background:rgba(10,18,38,0.6)}
  [data-theme="dark"] .mr-btn:hover{background:rgba(51,204,255,0.15)}
  [data-theme="light"] .mr-btn{color:#0a5bd0;border:1px solid rgba(0,95,255,0.3);background:rgba(255,255,255,0.7)}
  [data-theme="light"] .mr-btn:hover{background:rgba(0,140,255,0.1)}

  .mr-loader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    z-index:9;transition:opacity .8s;flex-direction:column;gap:18px}
  [data-theme="dark"] .mr-loader{background:#0a1126}
  [data-theme="light"] .mr-loader{background:#f2f7fd}
  .mr-loader.done{opacity:0;pointer-events:none}
  .mr-pulse{width:46px;height:46px;border-radius:50%;
    background:radial-gradient(circle, #33CCFF, #005FFF);
    animation:mrBeat 1.05s ease-in-out infinite}
  .mr-loader span{font-size:12px;letter-spacing:0.28em;text-transform:uppercase}
  [data-theme="dark"] .mr-loader span{color:#8fa3bf}
  [data-theme="light"] .mr-loader span{color:#6b7c95}
  @keyframes mrBeat{0%,100%{transform:scale(1)}12%{transform:scale(1.22)}24%{transform:scale(1.04)}36%{transform:scale(1.14)}50%{transform:scale(1)}}

  @media (max-width:700px){
    .mr-head{top:22px}
    .mr-btns{top:18px;right:14px}
  }
</style>
</head>

<section id="mr-hub-3d" data-theme="dark">
  <div class="mr-loader" id="mrLoader"><div class="mr-pulse"></div><span>Systems + Heart</span></div>
  <div class="mr-vignette"></div>
  <div class="mr-head">
    <span class="mr-eyebrow">Build Your Custom Operating System</span>
    <div class="mr-title">MedRebel <span class="lite">Intelligent Hub</span></div>
    <div class="mr-chips">
      <span class="mr-chip">HIPAA SECURE</span>

  <div class="mr-btns">
    <button class="mr-btn" id="mrTheme">LIGHT MODE</button>
    <button class="mr-btn" id="mrReset">RESET VIEW</button>
  </div>
  <div class="mr-hint">Drag to explore &middot; Hover a module</div>
</section>

/* ---------- orbit (drag, inertia, idle auto-rotate) ---------- */
const orbit = {
  radius: isMobile ? 34 : 28,
  theta: 0.0, phi: 1.32,
  vTheta: 0, vPhi: 0,
  dragging: false, lastX: 0, lastY: 0, lastInput: -10
};
const ORBIT_HOME = {theta: 0.0, phi: 1.32};
let resetTarget = null;

function applyCamera(){
  orbit.phi = Math.max(0.55, Math.min(2.05, orbit.phi));
  const sp = Math.sin(orbit.phi), cp = Math.cos(orbit.phi);
  camera.position.set(
    orbit.radius * sp * Math.sin(orbit.theta),
    orbit.radius * cp,
    orbit.radius * sp * Math.cos(orbit.theta)
  );
  camera.lookAt(0, 0.4, 0);
}

const cv = renderer.domElement;
function pointerDown(x, y){ orbit.dragging = true; orbit.lastX = x; orbit.lastY = y; cv.classList.add('dragging'); }
function pointerMoveDrag(x, y, t){
  if(!orbit.dragging) return;
  const dx = x - orbit.lastX, dy = y - orbit.lastY;
  orbit.vTheta = -dx * 0.0052; orbit.vPhi = -dy * 0.0042;
  orbit.theta += orbit.vTheta; orbit.phi += orbit.vPhi;
  orbit.lastX = x; orbit.lastY = y; orbit.lastInput = t;
}
function pointerUp(t){ orbit.dragging = false; orbit.lastInput = t; cv.classList.remove('dragging'); }

cv.addEventListener('mousedown', e => pointerDown(e.clientX, e.clientY));
window.addEventListener('mousemove', e => pointerMoveDrag(e.clientX, e.clientY, clockNow()));
window.addEventListener('mouseup', () => pointerUp(clockNow()));
cv.addEventListener('touchstart', e => { if(e.touches.length === 1) pointerDown(e.touches[0].clientX, e.touches[0].clientY); }, {passive: true});
cv.addEventListener('touchmove', e => { if(e.touches.length === 1) pointerMoveDrag(e.touches[0].clientX, e.touches[0].clientY, clockNow()); }, {passive: true});
cv.addEventListener('touchend', () => pointerUp(clockNow()), {passive: true});

document.getElementById('mrReset').addEventListener('click', () => {
  resetTarget = {theta: ORBIT_HOME.theta + Math.round((orbit.theta - ORBIT_HOME.theta) / (Math.PI * 2)) * Math.PI * 2, phi: ORBIT_HOME.phi};
});

/* ---------- glow texture ---------- */
function glowTexture(inner, outer){
  const c = document.createElement('canvas'); c.width = c.height = 256;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(128, 128, 0, 128, 128, 128);
  grad.addColorStop(0, inner); grad.addColorStop(0.35, outer); grad.addColorStop(1, 'rgba(0,0,0,0)');
  g.fillStyle = grad; g.fillRect(0, 0, 256, 256);
  const tx = new THREE.CanvasTexture(c); tx.colorSpace = THREE.SRGBColorSpace;
  return tx;
}
const softGlowTex = glowTexture(T.glowInner, T.glowOuter);
const BLEND = T.additive ? THREE.AdditiveBlending : THREE.NormalBlending;

/* ---------- the MedRebel logo mark, extruded facet by facet ----------
   Exact polygon coordinates from the brand SVG (80 x 65 mark).
   Facet 4 is the overlay facet and extrudes deeper so it reads
   correctly from both sides. */
const FACET_POLYS = [
  [[80,13],[60,0],[13,46],[80,39]],
  [[20,0],[0,13],[20,51],[40,13]],
  [[20,52],[40,65],[80,39],[43,15]],
  [[20,26],[0,13],[0,39],[20,52],[60,26],[60,0]]
];
const FACET_DEPTH = [9, 9, 9, 13];

const heartGroup = new THREE.Group();
scene.add(heartGroup);
const markGroup = new THREE.Group();
const MARK_SCALE = 0.082;
markGroup.scale.setScalar(MARK_SCALE);
heartGroup.add(markGroup);

const facetMeshes = [];
const heartMaterials = [];
FACET_POLYS.forEach((poly, i) => {
  const shape = new THREE.Shape();
  poly.forEach(([px, py], j) => {
    const x = px - 40, y = (65 - py) - 32.5;
    if(j === 0) shape.moveTo(x, y); else shape.lineTo(x, y);
  });
  shape.closePath();
  const geo = new THREE.ExtrudeGeometry(shape, {
    depth: FACET_DEPTH[i], bevelEnabled: true,
    bevelThickness: 0.9, bevelSize: 0.7, bevelSegments: 1, steps: 1
  });
  geo.translate(0, 0, -FACET_DEPTH[i] / 2);
  geo.computeVertexNormals();
  const col = new THREE.Color(T.facets[i]);
  const mat = new THREE.MeshPhysicalMaterial({
    color: col, flatShading: true,
    metalness: 0.22, roughness: 0.22, clearcoat: 0.75, clearcoatRoughness: 0.25,
    emissive: col.clone().multiplyScalar(0.22), emissiveIntensity: 0.15,
    envMapIntensity: 1.2
  });
  const mesh = new THREE.Mesh(geo, mat);
  let cx = 0, cy = 0;
  poly.forEach(([px, py]) => { cx += px - 40; cy += (65 - py) - 32.5; });
  cx /= poly.length; cy /= poly.length;
  const dir = new THREE.Vector2(cx, cy);
  if(dir.length() > 0.001) dir.normalize();
  mesh.userData.dir = dir;
  markGroup.add(mesh);
  facetMeshes.push(mesh);
  heartMaterials.push(mat);
});
heartGroup.position.y = 0.3;
heartGroup.userData.baseY = 0.3;

const heartGlow = new THREE.Sprite(new THREE.SpriteMaterial({

  blending: BLEND, depthWrite: false
}));
heartGlow.scale.setScalar(10.5);
heartGlow.position.y = 0.3;

/* ---------- heartbeat (lub-dub) ---------- */
const BPM = 58;
const PERIOD = 60 / BPM;
const beatAmp = reducedMotion ? 0.035 : 0.075;
function gauss(x, c, w){ const d = x - c; return Math.exp(-(d * d) / (2 * w * w)); }
function beatValue(phase){ return gauss(phase, 0.03, 0.045) + 0.55 * gauss(phase, 0.19, 0.055); }

const ringGeo = new THREE.RingGeometry(0.96, 1.0, 64);
const rings = [];
function spawnRing(){
  const m = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({
    color: T.ringColor, transparent: true, opacity: T.additive ? 0.45 : 0.3,
    side: THREE.DoubleSide, blending: BLEND, depthWrite: false
  }));
  m.rotation.x = -Math.PI / 2;
  m.position.y = -0.2;
  m.userData = {age: 0};
  scene.add(m); rings.push(m);
}

/* ---------- canvas helpers ---------- */
function roundRect(g, x, y, w, h, r){
  g.beginPath();
  g.moveTo(x + r, y);
  g.arcTo(x + w, y, x + w, y + h, r);
  g.arcTo(x + w, y + h, x, y + h, r);
  g.arcTo(x, y + h, x, y, r);
  g.arcTo(x, y, x + w, y, r);
  g.closePath();
}
function fitFont(g, text, weight, startPx, minPx, family, maxW){
  let px = startPx;
  while(px > minPx){
    g.font = weight + ' ' + px + 'px ' + family;
    if(g.measureText(text).width <= maxW) break;
    px -= 1;
  }
  return px;
}
const FAM = 'Inter, -apple-system, sans-serif';

function makeTexture(c){
  const tx = new THREE.CanvasTexture(c);
  tx.colorSpace = THREE.SRGBColorSpace;
  tx.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return tx;
}

function cardTexture(item, accent){
  const W = 768, H = 312;
  const c = document.createElement('canvas'); c.width = W; c.height = H;
  const g = c.getContext('2d');
  roundRect(g, 6, 6, W - 12, H - 12, 40);
  g.fillStyle = T.cardBg; g.fill();
  g.lineWidth = 3; g.strokeStyle = accent + T.cardBorderAlpha; g.stroke();
  g.beginPath(); g.arc(72, 84, 16, 0, Math.PI * 2);
  g.fillStyle = accent; g.fill();
  g.beginPath(); g.arc(72, 84, 27, 0, Math.PI * 2);
  g.strokeStyle = accent + '66'; g.lineWidth = 3; g.stroke();
  g.fillStyle = T.cardTitle;
  fitFont(g, item.title, '600', 40, 26, FAM, W - 190);
  g.fillText(item.title, 122, 98);
  g.fillStyle = T.cardDesc;
  fitFont(g, item.desc, '400', 29, 21, FAM, W - 120);
  g.fillText(item.desc, 60, 182);
  if(item.soon){
    g.font = '700 24px ' + FAM;
    const bw = g.measureText('COMING SOON').width + 44;
    roundRect(g, 60, 218, bw, 50, 25);
    g.fillStyle = 'rgba(245,158,11,0.15)'; g.fill();
    g.strokeStyle = 'rgba(245,158,11,0.6)'; g.lineWidth = 2; g.stroke();
    g.fillStyle = '#f59e0b';
    g.fillText('COMING SOON', 82, 252);
  } else if(item.price){
    g.fillStyle = T.priceColor; g.font = '700 28px ' + FAM;
    g.fillText(item.price, 60, 252);
  }
  return makeTexture(c);
}

function labelTexture(text, accent){
  const W = 1400, H = 110;
  const c = document.createElement('canvas'); c.width = W; c.height = H;
  const g = c.getContext('2d');
  g.fillStyle = accent;
  g.textAlign = 'center';
  const spaced = text.split('').join('  ');
  fitFont(g, spaced, '700', 46, 24, FAM, W - 60);
  g.fillText(spaced, W / 2, 70);
  return {tex: makeTexture(c), aspect: W / H};
}

function chipTexture(text){
  const W = 640, H = 112;

  const g = c.getContext('2d');

  g.fillStyle = T.chipBg; g.fill();
  g.lineWidth = 3; g.strokeStyle = T.chipBorder; g.stroke();

  g.fillText(text, W / 2, H / 2 + 13);

}

  if(logoImg){
    const lw = 380, lh = lw * (logoImg.height / logoImg.width);
    g.drawImage(logoImg, (W - lw) / 2, 100 + (180 - lh) / 2, lw, lh);
  } else {
    g.fillStyle = '#94a3b8'; g.font = '500 26px ' + FAM;
    g.fillText('[LOGO MISSING]', W / 2, 200);
  }
  const badges = ['HIPAA SECURE', 'REAL-TIME SYNC', 'READ & WRITE'];
  const bw = 212, gap = 14, total = badges.length * bw + (badges.length - 1) * gap;
  let bx = (W - total) / 2;
  badges.forEach(b => {
    roundRect(g, bx, 318, bw, 58, 29);
    g.fillStyle = 'rgba(16,185,129,0.12)'; g.fill();
    g.strokeStyle = 'rgba(16,185,129,0.5)'; g.lineWidth = 2; g.stroke();
    g.fillStyle = THEME_NAME === 'light' ? '#0e9f6e' : '#34d399';
    g.font = '600 22px ' + FAM;
    g.fillText(b, bx + bw / 2, 354);
    bx += bw + gap;
  });
  return makeTexture(c);
}

/* ---------- layout: outer shell ---------- */
const cards = [];
const connections = [];
const CARD_W = 4.7, CARD_H = CARD_W * (312 / 768);

function curveTo(target){
  const dir = target.clone().setY(0).normalize();
  const mid = dir.multiplyScalar(target.length() * 0.45);
  mid.y = target.y * 0.2 + 1.6;
  return new THREE.CubicBezierCurve3(
    new THREE.Vector3(0, 0.3, 0),
    new THREE.Vector3(mid.x * 0.35, 1.2, mid.z * 0.35),
    mid,
    target
  );
}

function addConnection(target, colorHex){
  const curve = curveTo(target);
  const tube = new THREE.Mesh(
    new THREE.TubeGeometry(curve, 48, 0.028, 6, false),
    new THREE.MeshBasicMaterial({color: colorHex, transparent: true, opacity: T.tubeOpacity,
      blending: BLEND, depthWrite: false})
  );
  scene.add(tube);
  const pulse = new THREE.Sprite(new THREE.SpriteMaterial({
    map: softGlowTex, color: colorHex, transparent: true, opacity: 0,
    blending: BLEND, depthWrite: false
  }));
  pulse.scale.setScalar(0.9);
  scene.add(pulse);
  const conn = {curve, tube, pulse, t: 2, delay: Math.random() * 0.22, baseOpacity: T.tubeOpacity};
  connections.push(conn);
  return conn;
}

function addCard(pos, texture, w, h, conn){
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map: texture, transparent: true}));
  sprite.scale.set(w, h, 1);
  sprite.position.copy(pos);
  sprite.userData = {baseScale: new THREE.Vector2(w, h), hover: 0, conn};
  scene.add(sprite);
  cards.push(sprite);
  if(conn) conn.card = sprite;
  return sprite;
}

function clusterHeights(n){
  const gap = n >= 5 ? 2.85 : 2.95;
  const arr = [];
  for(let i = 0; i < n; i++) arr.push(((n - 1) / 2 - i) * gap);
  return arr;
}

GROUPS.forEach(group => {
  const az = group.azimuth * Math.PI / 180;
  const n = group.items.length;
  const heights = clusterHeights(n);
  const R = n >= 5 ? 13.4 : 12.8;
  group.items.forEach((item, i) => {
    const mid = (n - 1) / 2;
    const jitter = (i - mid) * 0.13;
    const r = R + Math.abs(i - mid) * 0.5;
    const pos = new THREE.Vector3(r * Math.sin(az + jitter), heights[i], r * Math.cos(az + jitter));
    const conn = addConnection(pos, group.color);
    addCard(pos, cardTexture(item, group.color), CARD_W, CARD_H, conn);
  });
  const topY = heights[0] + 1.7;
  const lt = labelTexture(group.label, group.color);
  const label = new THREE.Sprite(new THREE.SpriteMaterial({
    map: lt.tex, transparent: true, opacity: 0.95, depthWrite: false
  }));
  const lw = 7.8;
  label.scale.set(lw, lw / lt.aspect, 1);
  const LR = R - 3.2;
  label.position.set(LR * Math.sin(az), topY, LR * Math.cos(az));
  scene.add(label);
});

/* PMS / EHR node with the real Open Dental logo */
(function(){
  const az = -138 * Math.PI / 180;
  const pos = new THREE.Vector3(11.6 * Math.sin(az), 1.2, 11.6 * Math.cos(az));
  const conn = addConnection(pos, THEME_NAME === 'light' ? '#0073e6' : '#33CCFF');
  const img = new Image();
  img.onload = () => addCard(pos, pmsCardTexture(img), 4.9, 4.9 * (432 / 768), conn);
  img.onerror = () => addCard(pos, pmsCardTexture(null), 4.9, 4.9 * (432 / 768), conn);
  img.src = 'data:image/png;base64,' + OD_LOGO_B64;
})();

/* ---------- inner ring: MedRebel OS core, included ---------- */
const coreGroup = new THREE.Group();
scene.add(coreGroup);
const CORE_R = 6.1;

const coreRing = new THREE.Mesh(
  new THREE.TorusGeometry(CORE_R, 0.016, 8, 140),
  new THREE.MeshBasicMaterial({color: T.ringColor, transparent: true, opacity: T.ringOpacity,
    blending: BLEND, depthWrite: false})
);
coreRing.rotation.x = Math.PI / 2;
coreRing.position.y = 0.3;
scene.add(coreRing);

CORE.forEach((text, i) => {
  const a = (i / CORE.length) * Math.PI * 2;
  const chip = new THREE.Sprite(new THREE.SpriteMaterial({map: chipTexture(text), transparent: true}));
  chip.scale.set(3.1, 3.1 * (112 / 640), 1);
  chip.position.set(CORE_R * Math.sin(a), 0.3 + Math.sin(i * 2.6) * 0.85, CORE_R * Math.cos(a));
  coreGroup.add(chip);
});

const coreLt = labelTexture('MEDREBEL OS CORE  ·  INCLUDED  ·  $499/MO', T.coreLabel);
const coreLabel = new THREE.Sprite(new THREE.SpriteMaterial({
  map: coreLt.tex, transparent: true, opacity: 0.95, depthWrite: false
}));
const clw = 7.6;
coreLabel.scale.set(clw, clw / coreLt.aspect, 1);
coreLabel.position.set(0, -3.6, 0);
scene.add(coreLabel);

/* ---------- ambient particles ---------- */
const starCount = isMobile ? 140 : 260;
const starPos = new Float32Array(starCount * 3);
for(let i = 0; i < starCount; i++){
  const r = 17 + Math.random() * 26;
  const a = Math.random() * Math.PI * 2;
  const y = (Math.random() - 0.5) * 26;
  starPos[i * 3] = r * Math.sin(a); starPos[i * 3 + 1] = y; starPos[i * 3 + 2] = r * Math.cos(a);
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({
  color: T.starColor, size: 0.07, transparent: true, opacity: T.starOpacity,
  blending: BLEND, depthWrite: false
}));
scene.add(stars);

/* ---------- hover raycast ---------- */
const raycaster = new THREE.Raycaster();
const mouseNDC = new THREE.Vector2(-10, -10);
let hovered = null;
cv.addEventListener('mousemove', e => {
  const r = cv.getBoundingClientRect();
  mouseNDC.set(((e.clientX - r.left) / r.width) * 2 - 1, -((e.clientY - r.top) / r.height) * 2 + 1);
});
cv.addEventListener('mouseleave', () => mouseNDC.set(-10, -10));

/* ---------- animation loop ---------- */
const clock = new THREE.Clock();
function clockNow(){ return clock.elapsedTime; }
let lastBeatIndex = -1;
let visible = true;
new IntersectionObserver(en => { visible = en[0].isIntersecting; }, {threshold: 0.05}).observe(section);

function animate(){
  requestAnimationFrame(animate);
  if(!visible) return;
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  if(!orbit.dragging){
    orbit.theta += orbit.vTheta; orbit.phi += orbit.vPhi;
    orbit.vTheta *= 0.92; orbit.vPhi *= 0.92;
    if(resetTarget){
      orbit.theta += (resetTarget.theta - orbit.theta) * 0.07;
      orbit.phi += (resetTarget.phi - orbit.phi) * 0.07;
      if(Math.abs(resetTarget.theta - orbit.theta) < 0.002 && Math.abs(resetTarget.phi - orbit.phi) < 0.002) resetTarget = null;
    } else if(!reducedMotion && t - orbit.lastInput > 3.5){
      orbit.theta += 0.0016;
    }
  } else {
    resetTarget = null;
  }
  applyCamera();

  /* heartbeat */
  const phase = (t % PERIOD) / PERIOD;
  const beat = beatValue(phase);
  heartGroup.scale.setScalar(1 + beatAmp * beat);
  heartGroup.position.y = heartGroup.userData.baseY + Math.sin(t * 0.8) * 0.12;
  heartGroup.rotation.y = Math.sin(t * 0.4) * 0.09;
  facetMeshes.forEach(m => {
    m.position.x = m.userData.dir.x * beat * 2.1;
    m.position.y = m.userData.dir.y * beat * 2.1;
  });
  heartGlow.position.y = heartGroup.position.y;
  heartGlow.material.opacity = T.glowBase + T.glowBeat * beat;
  heartGlow.scale.setScalar(10.2 + 2.4 * beat);
  heartLight.position.copy(heartGroup.position);
  heartLight.intensity = T.heartLightBase + T.heartLightBeat * beat;
  heartMaterials.forEach(m => { m.emissiveIntensity = 0.15 + 0.85 * beat; });

  const beatIndex = Math.floor(t / PERIOD);
  if(beatIndex !== lastBeatIndex){
    lastBeatIndex = beatIndex;
    if(!reducedMotion) spawnRing();
    connections.forEach(cn => { cn.t = -cn.delay; });
  }
  for(let i = rings.length - 1; i >= 0; i--){
    const m = rings[i];
    m.userData.age += dt;
    const a = m.userData.age / 1.25;
    if(a >= 1){ scene.remove(m); m.material.dispose(); rings.splice(i, 1); continue; }
    m.scale.setScalar(1.5 + a * 12);
    m.material.opacity = (T.additive ? 0.4 : 0.28) * (1 - a) * (1 - a);
  }
  connections.forEach(cn => {
    cn.t += dt / 0.95;
    if(cn.t >= 0 && cn.t <= 1){
      cn.pulse.position.copy(cn.curve.getPoint(cn.t));
      cn.pulse.material.opacity = Math.sin(cn.t * Math.PI) * 0.95;
    } else {
      cn.pulse.material.opacity = 0;
    }
  });

  /* inner core slowly orbits */
  if(!reducedMotion) coreGroup.rotation.y += dt * 0.1;

  /* hover */
  raycaster.setFromCamera(mouseNDC, camera);
  const hits = raycaster.intersectObjects(cards, false);
  const hit = hits.length ? hits[0].object : null;
  if(hit !== hovered){ hovered = hit; cv.classList.toggle('hovering', !!hovered); }
  cards.forEach(cd => {
    const target = cd === hovered ? 1 : 0;
    cd.userData.hover += (target - cd.userData.hover) * 0.14;
    const k = 1 + cd.userData.hover * 0.09;
    cd.scale.set(cd.userData.baseScale.x * k, cd.userData.baseScale.y * k, 1);
    if(cd.userData.conn){
      cd.userData.conn.tube.material.opacity = cd.userData.conn.baseOpacity + cd.userData.hover * (T.tubeHover - T.tubeOpacity);
    }
  });

  stars.rotation.y = t * 0.008;

  renderer.render(scene, camera);
}

applyCamera();
animate();
setTimeout(() => loaderEl.classList.add('done'), 900);

window.addEventListener('resize', () => {
  camera.aspect = section.clientWidth / section.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(section.clientWidth, section.clientHeight);
});
</script>
